services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gci409
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gci409"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/backend/Gci409.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5099
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=gci409;Username=postgres;Password=postgres
      Jwt__Issuer: gci409-api
      Jwt__Audience: gci409-client
      Jwt__SigningKey: local-development-signing-key-change-in-production-123456
      Jwt__ExpiryMinutes: 60
      OpenAI__Enabled: ${OPENAI_ENABLED:-false}
      OpenAI__ApiKey: ${OPENAI_API_KEY:-}
      OpenAI__RecommendationModel: ${OPENAI_RECOMMENDATION_MODEL:-gpt-4.1-mini}
      OpenAI__GenerationModel: ${OPENAI_GENERATION_MODEL:-gpt-4.1}
      OpenAI__Temperature: ${OPENAI_TEMPERATURE:-0.2}
      OpenAI__RequestTimeoutSeconds: ${OPENAI_REQUEST_TIMEOUT_SECONDS:-120}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5099:5099"

  worker:
    build:
      context: .
      dockerfile: src/backend/Gci409.Worker/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=gci409;Username=postgres;Password=postgres
      Jwt__Issuer: gci409-api
      Jwt__Audience: gci409-client
      Jwt__SigningKey: local-development-signing-key-change-in-production-123456
      Jwt__ExpiryMinutes: 60
      OpenAI__Enabled: ${OPENAI_ENABLED:-false}
      OpenAI__ApiKey: ${OPENAI_API_KEY:-}
      OpenAI__RecommendationModel: ${OPENAI_RECOMMENDATION_MODEL:-gpt-4.1-mini}
      OpenAI__GenerationModel: ${OPENAI_GENERATION_MODEL:-gpt-4.1}
      OpenAI__Temperature: ${OPENAI_TEMPERATURE:-0.2}
      OpenAI__RequestTimeoutSeconds: ${OPENAI_REQUEST_TIMEOUT_SECONDS:-120}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:
